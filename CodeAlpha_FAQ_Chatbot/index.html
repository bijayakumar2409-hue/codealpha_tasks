<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🤖 FAQ Chatbot</h1>

        <div class="faq">
            <button class="question">What is AI?</button>
            <div class="answer">
                <p>Artificial Intelligence (AI) enables computers to perform tasks that normally require human intelligence.</p>
            </div>
        </div>

        <div class="faq">
            <button class="question">What is Machine Learning?</button>
            <div class="answer">
                <p>Machine Learning is a branch of AI that allows systems to learn from data.</p>
            </div>
        </div>

        <div class="faq">
            <button class="question">What is a Chatbot?</button>
            <div class="answer">
                <p>A chatbot is a software application that can communicate with users using text or voice.</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
